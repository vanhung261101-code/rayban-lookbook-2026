
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray-Ban 2026 | Grand Lookbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .rayban-red { background-color: #E31837; }
        .product-card:hover .concept-img { opacity: 0; }
        .product-card:hover .studio-img { opacity: 1; transform: scale(1); }
        .studio-img { opacity: 0; transform: scale(1.05); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <nav class="p-8 border-b border-gray-900 flex justify-between items-center bg-black/90 backdrop-blur-md sticky top-0 z-50">
        <div class="text-4xl font-bold font-oswald italic uppercase tracking-tighter">Ray-Ban</div>
        <div class="rayban-red text-white px-6 py-1 text-xs font-bold uppercase italic tracking-widest">March 2026 Pitching</div>
    </nav>

    <section class="relative h-[85vh] flex items-center justify-center bg-black">
        <img src="https://scontent.fsgn5-15.fna.fbcdn.net/v/t39.30808-6/645293672_937905225273949_4683350457281632335_n.png?_nc_cat=107&ccb=1-7&_nc_sid=2a1932&_nc_ohc=okq8BVOoc5MQ7kNvwE2MOzm&_nc_oc=AdnnxBe_lrs3C0GRLzVfhxQwMDzfibquzln3YKQZ3X2NrmbA6Dq4d6ZvQojrpghieog3S6zutQmSprXCxxsXUQ71&_nc_zt=23&_nc_ht=scontent.fsgn5-15.fna&_nc_gid=oBfW9KN5WA_dbqdDaL0J6w&_nc_ss=8&oh=00_AfwDLlSXiEn3aO0_sHwr2w3cCLg2sN4aN3HI_5A02VbpeQ&oe=69B779CF" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="relative z-10 text-center">
            <h1 class="font-playfair italic text-7xl md:text-[10rem] mb-2 leading-none">Iconic</h1>
            <p class="font-oswald tracking-[0.8em] uppercase text-lg opacity-60">Spring Summer Forecast</p>
        </div>
    </section>

    <main class="py-20">
        <section class="mb-32">
            <div class="px-10 md:px-20 mb-12">
                <h2 class="text-6xl md:text-8xl font-playfair italic">New Arrivals</h2>
            </div>
            <div class="swiper grandSwiper px-10 md:px-20 !pb-20">
                <div class="swiper-wrapper">

        <div class="swiper-slide product-card group">
            <div class="relative aspect-[4/5] bg-[#111] overflow-hidden border border-gray-900">
                <img src="https://scontent.fsgn5-14.fna.fbcdn.net/v/t39.30808-6/639140234_931482465916225_7713442791864394146_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=13d280&_nc_ohc=kFikS3ODXOkQ7kNvwGF96uv&_nc_oc=AdmOsjXr69b7Fw23YflhH9KXZdrXuwGlMUo-dzqtbHUV3rcu4PFv5cnYwhSo5cWHFmqgJ0MPiLkWuXQMnsDFkK5Y&_nc_zt=23&_nc_ht=scontent.fsgn5-14.fna&_nc_gid=URi3FW0VJfLF6g_s1QvNCw&_nc_ss=8&oh=00_Afz8C-5g6E-Thz_ecCz3r2tG70llBqXHjof4k2D-vunfUw&oe=69B772AD" class="concept-img absolute inset-0 w-full h-full object-cover transition-opacity duration-700">
                <div class="studio-img absolute inset-0 bg-white p-16 flex items-center justify-center z-20">
                    <img src="https://scontent.fsgn5-14.fna.fbcdn.net/v/t39.30808-6/640538755_931482405916231_29686059848975198_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=13d280&_nc_ohc=izcERIaQkrIQ7kNvwEbTrLB&_nc_oc=AdlstC9m6rJgkPvDM-i9R2FCuugwKaPUE4dMPEnn21qgyFnHXKzWs5KnhR20Vra_9ZD0TBfg_VRLO__GvBsdvLUX&_nc_zt=23&_nc_ht=scontent.fsgn5-14.fna&_nc_gid=zwHgpli9luRjOp-6F3qgMQ&_nc_ss=8&oh=00_AfxpQ9bSE3ourB-1YNILn_dhWuCkFS1Q2da1-HuFctyeew&oe=69B75401" class="max-w-full max-h-full object-contain">
                </div>
            </div>
            <div class="mt-8 flex justify-between items-start">
                <div>
                    <h3 class="text-3xl font-oswald uppercase leading-none tracking-tight">By A$AP Rocky</h3>
                    <p class="text-gray-600 text-xs mt-2 uppercase font-semibold">SKU: RB3928 // Collection: A$AP Rocky Metal</p>
                </div>
                <div class="text-3xl font-bold text-rayban-red italic">$$254</div>
            </div>
            <div class="mt-6 border-l-4 border-rayban-red pl-6 py-4 bg-gray-900/40">
                <p class="text-sm italic font-light leading-relaxed text-gray-300">
                    <span class="font-bold text-rayban-red uppercase not-italic">Phân tích:</span> <br>
                    Khung kim loại mảnh, hình oval/chữ nhật theo phong cách "Urban Sophisticated" (Thành thị tinh tế)
                </p>
            </div>
        </div>
    
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </section>
    </main>
    <footer class="p-20 border-t border-gray-900 text-center opacity-40 uppercase tracking-[0.5em] text-[10px]">
        Ray-Ban Strategy Division // 2026
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        new Swiper(".grandSwiper", {
            slidesPerView: 1.1, spaceBetween: 30,
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            pagination: { el: ".swiper-pagination", clickable: true },
            breakpoints: { 1024: { slidesPerView: 2.2, spaceBetween: 60 } }
        });
    </script>
</body>
</html>
